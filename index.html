<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weatherly</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <!-- Top Navigation -->
  <nav class="nav">
    <div class="nav-content">
      <div class="logo">
        <i class="fa-solid fa-cloud-sun"></i>
        <span>Weatherly</span>
      </div>
      <div class="live-badge">
        <span class="dot"></span>
        <span>Live</span>
      </div>
    </div>
  </nav>

  <div class="container">
    <!-- Hero with Plane Image -->
    <div class="hero">
      <div class="hero-content">
        <h1>Weather,<br>instantly.</h1>
        <p class="hero-subtitle">Real-time weather + live aircraft tracking</p>
      </div>
      
      <!-- Plane Image -->
      <div class="hero-image">
        <img src="assets/plane.jpg" alt="Plane flying at sunset" class="plane-hero">
      </div>
    </div>

    <!-- Search -->
    <div class="search-section">
      <div class="search-bar">
        <input id="city-input" type="text" placeholder="Search any city...">
        <button id="search-btn">Search</button>
      </div>

      <div class="quick-cities">
        <button data-city="Copenhagen" class="quick-city">Copenhagen</button>
        <button data-city="London" class="quick-city">London</button>
        <button data-city="Paris" class="quick-city">Paris</button>
        <button data-city="New York" class="quick-city">New York</button>
        <button data-city="Tokyo" class="quick-city">Tokyo</button>
      </div>
    </div>

    <!-- Location Button -->
    <button id="location-btn" class="location-btn">
      <i class="fa-solid fa-location-arrow"></i>
      <span>Use my current location</span>
    </button>

    <!-- Weather Result -->
    <div id="weather-container" class="hidden"></div>

    <!-- Empty State -->
    <div id="empty-state" class="empty-state">
      <i class="fa-solid fa-cloud"></i>
      <h3>Ready when you are</h3>
      <p>Search for any city or use your current location.</p>
    </div>

    <!-- Error State -->
    <div id="error-state" class="error-state hidden">
      <i class="fa-solid fa-exclamation-triangle"></i>
      <p id="error-message"></p>
    </div>
  </div>

  <footer>
    <div class="footer-content">
      <span>Weatherly • Built with care</span>
      <span>Open-Meteo • Flightradar24</span>
    </div>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
