<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weatherly</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <!-- Top Navigation -->
  <nav class="nav">
    <div class="nav-content">
      <div class="logo">
        <i class="fa-solid fa-cloud-sun"></i>
        <span>Weatherly</span>
      </div>
      <div class="live-badge">
        <span class="dot"></span>
        <span>Live</span>
      </div>
    </div>
  </nav>

  <div class="container">
    <!-- Hero with SVG Plane -->
    <div class="hero">
      <div class="hero-content">
        <h1>Weather,<br>instantly.</h1>
        <p class="hero-subtitle">Real-time weather + live aircraft tracking</p>
      </div>
      
      <!-- Custom SVG Plane -->
      <div class="hero-svg">
        <svg width="320" height="180" viewBox="0 0 320 180" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Sky gradient background -->
          <defs>
            <linearGradient id="sky" x1="0" y1="0" x2="0" y2="180" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#1e2937"/>
              <stop offset="100%" stop-color="#0f172a"/>
            </linearGradient>
          </defs>
          <rect width="320" height="180" fill="url(#sky)"/>
          
          <!-- Plane body -->
          <path d="M80 95 L240 95" stroke="#e2e8f0" stroke-width="8" stroke-linecap="round"/>
          <!-- Wings -->
          <path d="M130 95 L110 60 L150 60 Z" fill="#64748b"/>
          <path d="M130 95 L110 130 L150 130 Z" fill="#64748b"/>
          <!-- Tail -->
          <path d="M80 95 L60 70 L70 95 Z" fill="#64748b"/>
          <!-- Cockpit -->
          <circle cx="235" cy="95" r="8" fill="#1e2937"/>
          <!-- Engine -->
          <rect x="200" y="88" width="18" height="14" rx="3" fill="#475569"/>
        </svg>
      </div>
    </div>

    <!-- Search -->
    <div class="search-section">
      <div class="search-bar">
        <input id="city-input" type="text" placeholder="Search any city...">
        <button id="search-btn">Search</button>
      </div>

      <div class="quick-cities">
        <button data-city="Copenhagen" class="quick-city">Copenhagen</button>
        <button data-city="London" class="quick-city">London</button>
        <button data-city="Paris" class="quick-city">Paris</button>
        <button data-city="New York" class="quick-city">New York</button>
        <button data-city="Tokyo" class="quick-city">Tokyo</button>
      </div>
    </div>

    <!-- Location Button -->
    <button id="location-btn" class="location-btn">
      <i class="fa-solid fa-location-arrow"></i>
      <span>Use my current location</span>
    </button>

    <!-- Weather Result -->
    <div id="weather-container" class="hidden"></div>

    <!-- Empty State -->
    <div id="empty-state" class="empty-state">
      <i class="fa-solid fa-cloud"></i>
      <h3>Ready when you are</h3>
      <p>Search for any city or use your current location.</p>
    </div>

    <!-- Error State -->
    <div id="error-state" class="error-state hidden">
      <i class="fa-solid fa-exclamation-triangle"></i>
      <p id="error-message"></p>
    </div>
  </div>

  <footer>
    <div class="footer-content">
      <span>Weatherly • Built with care</span>
      <span>Open-Meteo • Flightradar24</span>
    </div>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
