<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weatherly • Modern Weather</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="max-w-lg mx-auto px-4 py-8">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-x-3">
        <div class="w-11 h-11 bg-blue-600 rounded-2xl flex items-center justify-center text-white">
          <i class="fa-solid fa-cloud-sun text-3xl"></i>
        </div>
        <div>
          <h1 class="text-3xl font-semibold tracking-tighter text-white">Weatherly</h1>
          <p class="text-xs text-zinc-500 -mt-1">Modern Edition</p>
        </div>
      </div>
      <div class="text-xs px-3 py-1 bg-zinc-900 border border-zinc-700 rounded-full text-zinc-400 flex items-center gap-x-1">
        <i class="fa-solid fa-globe fa-xs"></i>
        <span>Open-Meteo</span>
      </div>
    </div>

    <!-- Search -->
    <div class="mb-6">
      <div class="flex gap-2">
        <div class="flex-1 relative">
          <input id="city-input" type="text" placeholder="Enter city name (e.g. Copenhagen)"
                 class="w-full px-4 py-3 rounded-2xl border border-zinc-700 bg-zinc-900 focus:border-blue-500 outline-none text-white placeholder:text-zinc-500">
          <i class="fa-solid fa-search absolute right-4 top-4 text-zinc-500"></i>
        </div>
        <button id="search-btn"
                class="px-6 py-3 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 transition-colors text-white rounded-2xl font-medium flex items-center gap-x-2 text-sm">
          <i class="fa-solid fa-search"></i>
          <span class="hidden sm:inline">Search</span>
        </button>
      </div>

      <!-- Quick cities -->
      <div class="flex flex-wrap gap-2 mt-3">
        <button data-city="Copenhagen" class="quick-city text-xs px-3 py-1.5 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-full text-zinc-300 transition-colors">Copenhagen</button>
        <button data-city="London" class="quick-city text-xs px-3 py-1.5 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-full text-zinc-300 transition-colors">London</button>
        <button data-city="New York" class="quick-city text-xs px-3 py-1.5 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-full text-zinc-300 transition-colors">New York</button>
        <button data-city="Tokyo" class="quick-city text-xs px-3 py-1.5 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-full text-zinc-300 transition-colors">Tokyo</button>
      </div>
    </div>

    <!-- Location button -->
    <button id="location-btn"
            class="w-full mb-6 flex items-center justify-center gap-x-2 py-3 text-sm font-medium text-blue-400 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 active:bg-zinc-950 rounded-2xl transition-colors">
      <i class="fa-solid fa-location-arrow"></i>
      <span>Use my current location</span>
    </button>

    <!-- Results -->
    <div id="weather-container" class="hidden"></div>

    <!-- Empty state -->
    <div id="empty-state" class="text-center py-8 px-4">
      <div class="mx-auto w-16 h-16 bg-zinc-900 border border-zinc-800 rounded-full flex items-center justify-center mb-4">
        <i class="fa-solid fa-cloud text-3xl text-zinc-700"></i>
      </div>
      <p class="text-zinc-400 text-sm">Enter a city or use your location<br>to see the current weather.</p>
    </div>

    <!-- Error -->
    <div id="error-state" class="hidden bg-red-950 border border-red-900 text-red-400 rounded-2xl p-4 text-sm">
      <div class="flex gap-2">
        <i class="fa-solid fa-exclamation-circle mt-0.5"></i>
        <div>
          <span id="error-message"></span>
        </div>
      </div>
    </div>
  </div>

  <footer class="text-center py-6 text-xs text-zinc-500">
    Weatherly • Built with modular architecture • Deployed on Vercel
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
